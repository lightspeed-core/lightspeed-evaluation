name: Check dependencies

on:
  - push
  - pull_request

jobs:
  check_dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check Python version
        run: python --version
      - name: Install uv
        run: pip install --user uv
      - name: uv version
        run: uv --version
      - name: Generate pinned requirements files
        run: make generate-requirements
      - name: List generated requirements files
        run: ls -la requirements.txt requirements-*.txt
      - name: Verify requirements files are up-to-date
        run: |
          if ! git diff --exit-code requirements.txt requirements-*.txt; then
            echo "❌ ERROR: Generated requirements files have uncommitted changes!"
            echo ""
            echo "The requirements-*.txt files are out of sync with uv.lock."
            echo "Please run locally:"
            echo "  make generate-requirements"
            echo "  git add requirements*.txt"
            echo "  git commit -m 'chore: regenerate requirements files'"
            exit 1
          fi
          echo "✅ All requirements files are up-to-date"
