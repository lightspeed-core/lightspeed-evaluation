- conversation_group_id: okp_aws_secure_boot
  description: >
    Tests retrieval of RHEL-specific AWS documentation about Secure
    Boot. The answer must mention that AWS supports Secure Boot for
    Nitro instances and that it works with both Marketplace AMIs and
    custom RHEL AMIs. This is platform-specific knowledge.
  tag: okp_rhel
  turns:
    - turn_id: aws_secure_boot
      query: >
        How do I configure RHEL on AWS with Secure Boot?
      expected_response: >
        AWS supports the Secure Boot mechanism for Nitro instances.
        You can use the feature for both Marketplace AMIs and custom
        RHEL Amazon Machine Images. For detailed configuration steps,
        refer to the Red Hat documentation for setting up Secure Boot
        on AWS.
      expected_keywords:
        - - Secure Boot
        - - Nitro
        - - AMI
          - Amazon Machine Image
      expected_intent: >
        Explain how to configure RHEL instances on AWS with Secure
        Boot, including which instance types support it
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

- conversation_group_id: okp_rhel_registration
  description: >
    Tests retrieval of RHEL system registration documentation.
    The answer should reference subscription-manager and optionally
    rhc connect as registration methods. These are RHEL-specific
    tools.
  tag: okp_rhel
  turns:
    - turn_id: rhel_registration
      query: >
        How do I register my RHEL system with Red Hat to access
        content repositories and updates?
      expected_response: >
        To register a RHEL system using the CLI, use the
        subscription-manager command line tool. Run
        subscription-manager register with your activation key
        and organization ID. Alternatively, you can use rhc connect
        to register and connect to Red Hat services including
        Red Hat Insights.
      expected_keywords:
        - - subscription-manager
          - rhc
        - - register
          - connect
      expected_intent: >
        Explain how to register a RHEL system to Red Hat from
        the command line using available tools
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

# ===========================================================================
# 6. MULTI-TURN RETENTION — follow-up questions testing context retention
# ===========================================================================

- conversation_group_id: okp_retention_openshift_hw_to_platforms
  description: >
    Turn 1 asks about SNO hardware requirements. Turn 2 asks how
    those requirements differ for multi-node clusters. The assistant
    must remember the SNO specs from turn 1 and contrast them with
    multi-node specs, demonstrating retention of retrieved facts
    across turns.
  tag: okp_retention
  conversation_metrics:
    - deepeval:knowledge_retention
  turns:
    - turn_id: sno_requirements_recap
      query: >
        What are the hardware requirements for a single node
        OpenShift cluster?
      expected_response: >
        A single node OpenShift cluster requires a minimum of
        8 vCPUs and 120 GB of storage.
      expected_keywords:
        - - "8"
          - vCPU
        - - "120"
          - storage
      expected_intent: retrieve SNO hardware requirements
      turn_metrics:
        - ragas:faithfulness
        - custom:answer_correctness
        - custom:keywords_eval

    - turn_id: multinode_contrast
      query: >
        How do those requirements differ for a multi-node cluster?
      expected_response: >
        Multi-node clusters have different requirements for control
        plane and compute nodes. Control plane nodes require 4 vCPUs,
        16 GB of RAM, and 100 GB of storage, while compute nodes
        require 2 vCPUs, 8 GB of RAM, and 100 GB of storage.
        Compared to the single node requirements of 8 vCPUs and
        120 GB storage, each individual node in a multi-node cluster
        needs fewer resources since the workload is distributed.
      expected_keywords:
        - - control plane
          - master
        - - compute
          - worker
        - - "4"
          - "2"
      expected_intent: >
        Compare multi-node cluster requirements with the SNO
        requirements from the previous answer
      turn_metrics:
        - ragas:faithfulness
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

