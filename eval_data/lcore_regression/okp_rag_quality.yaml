- conversation_group_id: okp_ignition_failure
  description: >
    Tests retrieval of troubleshooting documentation for the
    ignition download failure error. The response should explain
    what the error means and common causes.
  tag: okp_openshift
  turns:
    - turn_id: ignition_failure_explanation
      query: >
        What does "Failed to download ignition file" mean?
      expected_response: >
        The "Failed to download ignition file" error typically
        indicates a network connectivity issue between the host and
        the cluster's API server. Common causes include DNS
        resolution failures, firewall rules blocking access, or
        network configuration issues preventing the host from
        reaching the ignition endpoint.
      expected_keywords:
        - - ignition
        - - network
          - DNS
          - firewall
          - connectivity
      expected_intent: >
        Explain what the ignition download failure error means and
        common causes like network connectivity, DNS, or firewall
        issues
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

