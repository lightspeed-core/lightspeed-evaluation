      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

- conversation_group_id: okp_ha_batch_creation
  description: >
    Tests retrieval of the offline CIB technique for speeding up
    bulk resource creation in Pacemaker clusters. The answer must
    mention using the -f option with an offline CIB file and
    pushing changes with diff-against.
  tag: okp_rhel
  turns:
    - turn_id: batch_creation
      query: >
        I would like to create a lot of cluster resources and it's
        taking a long time, how can I speed it up?
      expected_response: >
        To speed up bulk resource creation, use the pcs -f option to
        work on an offline CIB file instead of the live cluster. Copy
        the current CIB with pcs cluster cib, run your pcs resource
        create commands with -f specifying the CIB file, then push
        the changes with pcs cluster cib-push using diff-against to
        avoid overwriting concurrent changes.
      expected_keywords:
        - - pcs
        - - CIB
          - cib
        - - "-f"
          - offline
      expected_intent: >
        Explain how to speed up bulk resource creation using
        offline CIB files in a Pacemaker cluster
      turn_metrics:
