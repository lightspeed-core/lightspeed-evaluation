# OKP RAG Quality Benchmarks — LCORE Regression
#
# These scenarios validate RAG retrieval quality, faithfulness, and response
# relevancy against real product documentation indexed in OKP (Solr).
#
# Data sources:
#   - OpenShift Installer evaluation data (cluster installation, OCI, hardware)
#   - RHEL Lightspeed CLA evaluation data (SAP, HA, SELinux, registration)
#
# When api.enabled is true, the evaluation framework auto-populates:
#   response   — the LLM's answer from the stack
#   contexts   — the RAG chunks the stack retrieved from OKP
#
# We provide:
#   query              → sent to the stack
#   expected_response  → used by custom:answer_correctness (semantic comparison)
#   expected_keywords  → used by custom:keywords_eval (deterministic matching)
#   expected_intent    → used by custom:intent_eval (intent match)
#   turn_metrics       → which metrics to run on each turn
#
# Keyword format:
#   Inner list = OR (at least one term must appear)
#   Outer list = AND (all groups must match)
#
# Sections:
#   1. OpenShift — retrieval precision (specific facts from OCP docs)
#   2. OpenShift — OCI deployment (Oracle Cloud Infrastructure specifics)
#   3. RHEL — SAP Solutions (product-specific knowledge)
#   4. RHEL — High Availability (Pacemaker/Corosync specifics)
#   5. RHEL — platform-specific (SELinux, AWS, Samba)
#   6. Multi-turn retention (follow-up questions testing context retention)

# ===========================================================================
# 1. OPENSHIFT — RETRIEVAL PRECISION
# ===========================================================================

- conversation_group_id: okp_sno_requirements
  description: >
    Tests whether OKP retrieves the correct documentation about Single
    Node OpenShift (SNO) hardware requirements. The answer contains
    specific numbers (8 vCPUs, 120 GB storage) that can only come
    from the OpenShift documentation.
  tag: okp_openshift
  turns:
    - turn_id: sno_hw_requirements
      query: >
        What are the host requirements for a single node OpenShift cluster?
      expected_response: >
        A single node OpenShift cluster requires a minimum of 8 vCPUs
        and 120 GB of storage. You need only a temporary bootstrap
        machine and one cloud instance for the control plane node,
        with no separate compute nodes required.
      expected_keywords:
        - - "8"
          - vCPU
        - - "120"
          - storage
      expected_intent: >
        Retrieve hardware requirements for Single Node OpenShift
        including CPU and storage specifications
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

- conversation_group_id: okp_multinode_requirements
  description: >
    Tests retrieval of multi-node cluster hardware requirements. The
    answer must distinguish between control plane nodes (4 CPU, 16 GB
    RAM, 100 GB) and compute nodes (2 CPU, 8 GB RAM, 100 GB). Getting
    both sets of numbers correct proves the right doc chunks were
    retrieved.
  tag: okp_openshift
  turns:
    - turn_id: multinode_hw_requirements
      query: >
        What are the minimum resource requirements for control plane
        and compute nodes in an OpenShift high availability cluster?
      expected_response: >
        Control plane nodes in a multi-node cluster require 4 CPU cores,
        16 GB of RAM, and 100 GB of storage. The compute nodes require
        2 CPU cores, 8 GB of RAM, and 100 GB of storage.
      expected_keywords:
        - - control plane
          - master
        - - compute
          - worker
        - - CPU
          - RAM
          - storage
      expected_intent: >
        Retrieve hardware requirements for multi-node OpenShift clusters
        including separate specifications for control plane and compute nodes
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

- conversation_group_id: okp_assisted_installer
  description: >
    Tests retrieval of Assisted Installer documentation. The response
    should describe the overall installation workflow including cluster
    definition, discovery ISO, host discovery, and installation steps.
  tag: okp_openshift
  turns:
    - turn_id: assisted_installer_overview
      query: >
        What is the Assisted Installer and how does the installation
        workflow work?
      expected_response: >
        The Assisted Installer is a tool that simplifies the deployment
        of OpenShift clusters. The workflow involves defining a cluster
        configuration, generating and downloading a Discovery ISO,
        booting hosts with the ISO so they are discovered, configuring
        the hosts and networking, and then running the installation.
        The Assisted Installer manages the process and monitors progress.
      expected_keywords:
        - - Assisted Installer
        - - Discovery ISO
          - ISO
        - - cluster
          - install
      expected_intent: >
        Explain what the Assisted Installer is and describe the
        installation workflow steps
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

- conversation_group_id: okp_supported_platforms
  description: >
    Tests whether OKP retrieves the correct list of supported
    on-premise platforms for OpenShift installation. The response
