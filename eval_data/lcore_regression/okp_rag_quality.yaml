# OKP RAG Quality Benchmarks — LCORE Regression
#
# These scenarios validate RAG retrieval quality, faithfulness, and response
# relevancy against real product documentation indexed in OKP (Solr).
#
# Data sources:
#   - OpenShift Installer evaluation data (cluster installation, OCI, hardware)
#   - RHEL Lightspeed CLA evaluation data (SAP, HA, SELinux, registration)
#
# When api.enabled is true, the evaluation framework auto-populates:
#   response   — the LLM's answer from the stack
#   contexts   — the RAG chunks the stack retrieved from OKP
#
# We provide:
#   query              → sent to the stack
#   expected_response  → used by custom:answer_correctness (semantic comparison)
#   expected_keywords  → used by custom:keywords_eval (deterministic matching)
#   expected_intent    → used by custom:intent_eval (intent match)
#   turn_metrics       → which metrics to run on each turn
#
# Keyword format:
#   Inner list = OR (at least one term must appear)
#   Outer list = AND (all groups must match)
#
# Distribution (100 active turns, guided queries supplementary):
#   Core / Happy Path:           50 turns (50%)
#   Edge Cases & Boundaries:     15 turns (15%)
#   Negative RAG Scenarios:      20 turns (20%)
#   Multi-turn Retention:        15 turns (15%)
#
# Sections:
#   1. OpenShift — retrieval precision   (11 core turns)
#   2. OpenShift — OCI deployment         (4 core turns)
#   3. RHEL — SAP Solutions               (3 core turns)
#   4. RHEL — High Availability           (4 core turns)
#   5. RHEL — platform-specific          (28 core turns)
#   6. Multi-turn retention              (15 turns across 7 groups)
#   7. Guided queries                     (8 supplementary, not counted)
#   8. Edge cases & domain boundaries    (15 turns)
#   9. Negative RAG scenarios            (20 turns)

# ===========================================================================
# 1. OPENSHIFT — RETRIEVAL PRECISION
# ===========================================================================

- conversation_group_id: okp_sno_requirements
  description: >
    Tests whether OKP retrieves the correct documentation about Single
    Node OpenShift (SNO) hardware requirements. The answer contains
    specific numbers (8 CPU cores, 16 GB RAM, 100 GB storage) that
    can only come from the OpenShift documentation.
  tag: okp_openshift
  turns:
    - turn_id: sno_hw_requirements
      query: >
        What are the host requirements for a single node cluster?
      expected_response: >
        A single node OpenShift cluster requires a minimum of 8 CPU
        cores, 16 GB of RAM, and 100 GB of storage. You need only a
        temporary bootstrap machine and one cloud instance for the
        control plane node, with no separate compute nodes required.
      expected_keywords:
        - - "8"
          - CPU
        - - "16"
          - RAM
        - - "100"
          - storage
      expected_intent: >
        Retrieve hardware requirements for Single Node OpenShift
        including CPU, RAM, and storage specifications
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

- conversation_group_id: okp_multinode_requirements
  description: >
    Tests whether OKP can retrieve multi-node cluster hardware
    requirements from a natural user query. The original query uses
    general language ("host requirements for a multi-node cluster")
    without naming specific doc terms like "control plane" or
    "high availability." Known OKP weakness: retrieves dual-stack
    IPv4/IPv6 networking docs instead of resource requirement tables.
    See okp_multinode_requirements_guided for the optimized version.
  tag: okp_openshift
  turns:
    - turn_id: multinode_hw_requirements
      query: >
        What are the host requirements for a multinode cluster?
      expected_response: >
        Control plane nodes in a multi-node cluster require 4 CPU cores,
        16 GB of RAM, and 100 GB of storage. The compute nodes require
        2 CPU cores, 8 GB of RAM, and 100 GB of storage.
      expected_keywords:
        - - control plane
          - master
        - - compute
          - worker
        - - CPU
          - RAM
          - storage
      expected_intent: >
        Retrieve hardware requirements for multi-node OpenShift clusters
        including separate specifications for control plane and compute nodes
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

