- conversation_group_id: okp_uuid_partuuid
  description: >
    Tests retrieval of documentation explaining the difference
    between UUID and PARTUUID in Linux filesystems. The answer
    must distinguish filesystem-level UUID from partition-table
    PARTUUID.
  tag: okp_rhel
  turns:
    - turn_id: uuid_partuuid
      query: >
        What is the difference between UUID and PARTUUID in linux
        filesystem?
      expected_response: >
        UUID is assigned to a filesystem on a partition and uniquely
        identifies that filesystem. It is used in /etc/fstab to
        ensure filesystems are mounted correctly at boot time.
        PARTUUID is stored in the partition table (GPT or MBR) and
        identifies the partition itself, independent of any
        filesystem. It is used in the grub bootloader and in early
        boot stages when the system only sees partitions.
      expected_keywords:
        - - UUID
        - - PARTUUID
        - - filesystem
          - partition
      expected_intent: >
        Explain the difference between UUID and PARTUUID including
        where each is used
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

