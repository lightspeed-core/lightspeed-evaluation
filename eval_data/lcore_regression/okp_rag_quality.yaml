      query: >
        Give me a command to move resource r1 to node n2
      expected_response: >
        To move resource r1 to node n2, use the command pcs resource
        move r1 n2. This adds a location constraint to prevent r1
        from running on its current node and moves it to n2. The
        constraint is automatically removed once the resource is
