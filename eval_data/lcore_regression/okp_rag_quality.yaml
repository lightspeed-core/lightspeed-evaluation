  tag: okp_openshift
  turns:
    - turn_id: supported_platforms
      query: >
        Which platforms are supported for installing OpenShift
        clusters using the Assisted Installer?
      expected_response: >
        The supported on-premise platforms for OpenShift installation
        include bare metal, vSphere, Nutanix, and Oracle Cloud
        Infrastructure (OCI).
      expected_keywords:
        - - bare metal
          - baremetal
        - - vSphere
        - - Nutanix
        - - OCI
          - Oracle
      expected_intent: >
        List the supported platforms for OpenShift cluster installation
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

# ===========================================================================
# 2. OPENSHIFT — OCI DEPLOYMENT
# ===========================================================================

- conversation_group_id: okp_oci_vpu_requirements
  description: >
    Tests retrieval of very specific OCI volume performance unit
    recommendations. The answer includes exact numbers for three
    environment tiers (test: 100GB/20-30 VPUs, basic: 500GB/60 VPUs,
    heavy production: 500GB+/100+ VPUs). These numbers would
    hallucinate without correct RAG retrieval.
  tag: okp_oci
  turns:
    - turn_id: oci_vpu_recommendations
      query: >
        What volume performance units are recommended for installing
        an OpenShift cluster on Oracle Cloud Infrastructure?
      expected_response: >
        To ensure the best performance for your OpenShift cluster
        on OCI, size your volume performance units appropriately.
        For a test or proof of concept environment, use 100 GB and
        20 to 30 VPUs. For a basic environment, use 500 GB and
        60 VPUs. For a heavy production environment, use more than
        500 GB and 100 or more VPUs. Consider reserving additional
        VPUs for updates and scaling activities.
      expected_keywords:
        - - VPU
          - volume performance
        - - "100"
        - - "500"
      expected_intent: >
        Retrieve VPU sizing recommendations for OpenShift on OCI
        across different environment tiers
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

- conversation_group_id: okp_oci_deployment_flow
  description: >
    Tests retrieval of the OCI deployment flow procedure. The answer
    should describe the multi-step process specific to deploying
    OpenShift on OCI through the Assisted Installer.
  tag: okp_oci
  turns:
    - turn_id: oci_deployment_steps
      query: >
        What is the deployment flow when deploying OpenShift
        to Oracle Cloud Infrastructure?
      expected_response: >
        The deployment flow for OpenShift on OCI involves configuring
        the OCI account, setting up a cluster in the Assisted Installer,
        creating the infrastructure in OCI, and completing the cluster
        installation through the Assisted Installer.
      expected_keywords:
        - - OCI
          - Oracle
        - - Assisted Installer
        - - cluster
          - install
      expected_intent: >
        Describe the step-by-step deployment flow for deploying
        OpenShift on Oracle Cloud Infrastructure
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

- conversation_group_id: okp_oci_manifests
  description: >
    Tests retrieval of specific technical details about OCI
    deployment — the mandatory custom manifest files that must be
    uploaded to the Assisted Installer. The specific file names
    (oci-ccm.yml, oci-csi.yml, machineconfig-ccm.yml,
    machineconfig-csi.yml) prove RAG retrieval worked.
  tag: okp_oci
  turns:
    - turn_id: oci_mandatory_manifests
      query: >
        Are there any mandatory manifests needed by the Assisted
        Installer when deploying a cluster on OCI?
      expected_response: >
        Yes, when deploying a cluster on OCI using the Assisted
        Installer, you need to upload four mandatory custom manifests
        provided by Oracle: oci-ccm.yml, oci-csi.yml,
        machineconfig-ccm.yml, and machineconfig-csi.yml. These
        should be placed in the appropriate manifests and openshift
        folders.
      expected_keywords:
        - - manifest
        - - oci-ccm
          - oci-csi
          - machineconfig
      expected_intent: >
        Identify mandatory manifest files required for OCI deployment
        through the Assisted Installer
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

# ===========================================================================
# 3. RHEL — SAP SOLUTIONS
# ===========================================================================

- conversation_group_id: okp_rhel_sap_definition
  description: >
    Tests whether OKP retrieves the RHEL for SAP Solutions product
    definition. The answer must explain how it differs from standard
    RHEL, including SAP-specific repositories, tools, and support.
    This is product-specific knowledge that requires RAG.
  tag: okp_rhel
  turns:
    - turn_id: sap_solutions_definition
      query: >
        What is RHEL for SAP Solutions and how is it different
        from standard RHEL?
      expected_response: >
        RHEL for SAP Solutions is a Red Hat subscription that consists
        of Red Hat Enterprise Linux and additional software repositories
        and services specifically designed for running SAP HANA and SAP
        ABAP Platform, including SAP S/4HANA, on Red Hat Enterprise
        Linux. It combines the reliability and performance of Linux with
        technologies that meet SAP workload requirements. It is certified
        for integration with SAP S/4HANA and built on the same foundation
        as standard RHEL, but includes additional SAP-specific
        repositories, tools, and support.
      expected_keywords:
        - - SAP
          - RHEL
        - - SAP HANA
          - S/4HANA
        - - repositories
          - subscription
      expected_intent: >
        Define RHEL for SAP Solutions and explain how it differs
        from standard RHEL
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

- conversation_group_id: okp_sap_system_roles
  description: >
    Tests retrieval of the three specific RHEL System Role names
    for SAP. The answer must include the exact role names:
    sap_general_preconfigure, sap_hana_preconfigure, and
    sap_netweaver_preconfigure. These are precise identifiers
    that can only come from the documentation.
  tag: okp_rhel
  turns:
    - turn_id: sap_role_names
      query: >
        What are the names of the three RHEL System Roles for SAP
        used to preconfigure systems?
      expected_response: >
        The three RHEL System Roles for SAP are sap_general_preconfigure,
        sap_hana_preconfigure, and sap_netweaver_preconfigure. The
        sap_general_preconfigure role provides general SAP system
        configuration, sap_hana_preconfigure prepares systems for
        SAP HANA installation, and sap_netweaver_preconfigure prepares
        systems for SAP NetWeaver installation.
      expected_keywords:
        - - sap_general_preconfigure
        - - sap_hana_preconfigure
        - - sap_netweaver_preconfigure
      expected_intent: >
        Retrieve the exact names and purposes of the three RHEL
        System Roles for SAP preconfiguration
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

# ===========================================================================
# 4. RHEL — HIGH AVAILABILITY
# ===========================================================================

- conversation_group_id: okp_ha_fencing
  description: >
    Tests retrieval of Red Hat's policy on HA cluster fencing. The
    answer must mention stonith-enabled=false, state that Red Hat does
    not support clusters without fencing in production, and explain
    why fencing is important. This is RHEL-specific guidance.
  tag: okp_rhel
  turns:
    - turn_id: fencing_policy
      query: >
        Can I create a Pacemaker cluster without fencing on RHEL?
      expected_response: >
        While it is technically possible to create a cluster without
        fencing by setting stonith-enabled=false, it is not recommended
        for production environments. Red Hat does not support clusters
        when fencing is disabled as it compromises reliability and
        safety. Fencing is crucial for ensuring that failed nodes are
        isolated to prevent data corruption and inconsistencies.
      expected_keywords:
        - - fencing
          - stonith
        - - Red Hat
          - support
        - - production
      expected_intent: >
        Explain Red Hat's policy on running HA clusters without
        fencing and why fencing is important
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

