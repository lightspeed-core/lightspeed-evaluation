# ===========================================================================
# 4. RHEL — HIGH AVAILABILITY
# ===========================================================================

- conversation_group_id: okp_ha_fencing
  description: >
    Tests retrieval of Red Hat's policy on HA cluster fencing. The
    answer must mention stonith-enabled=false, state that Red Hat does
    not support clusters without fencing in production, and explain
    why fencing is important. This is RHEL-specific guidance.
  tag: okp_rhel
  turns:
    - turn_id: fencing_policy
      query: >
        Can I create a cluster without fencing?
      expected_response: >
        While it is technically possible to create a cluster without
        fencing by setting stonith-enabled=false, it is not recommended
        for production environments. Red Hat does not support clusters
        when fencing is disabled as it compromises reliability and
        safety. Fencing is crucial for ensuring that failed nodes are
        isolated to prevent data corruption and inconsistencies.
      expected_keywords:
        - - fencing
          - stonith
        - - Red Hat
          - support
        - - production
      expected_intent: >
        Explain Red Hat's policy on running HA clusters without
        fencing and why fencing is important
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

- conversation_group_id: okp_ha_resource_ordering
  description: >
    Tests retrieval of Pacemaker resource ordering and colocation
    constraint commands. The answer must include pcs constraint
    order and pcs constraint colocation add with INFINITY score.
  tag: okp_rhel
  turns:
    - turn_id: resource_ordering
      query: >
        Give me a command to make resources r1 and r2 to start in
        sequence and run on the same node
      expected_response: >
        To make resources r1 and r2 start in sequence and run on the
        same node, use the pcs command-line utility. Create an order
        constraint with pcs constraint order start r1 then start r2.
        Then create a colocation constraint with pcs constraint
        colocation add r2 with r1 INFINITY to ensure both resources
        run on the same node.
      expected_keywords:
        - - pcs
        - - constraint
        - - order
          - colocation
      expected_intent: >
        Provide pcs commands for resource ordering and colocation
        constraints in a Pacemaker cluster
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

- conversation_group_id: okp_ha_resource_move
