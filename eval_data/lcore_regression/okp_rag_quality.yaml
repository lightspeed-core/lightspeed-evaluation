- conversation_group_id: okp_oci_vpu_requirements
  description: >
    Tests retrieval of very specific OCI volume performance unit
    recommendations. The answer includes exact numbers for three
    environment tiers (test: 100GB/20-30 VPUs, basic: 500GB/60 VPUs,
    heavy production: 500GB+/100+ VPUs). These numbers would
    hallucinate without correct RAG retrieval.
  tag: okp_oci
  turns:
    - turn_id: oci_vpu_recommendations
      query: >
        What volume performance units are recommended for installing
        an OpenShift cluster on OCI?
      expected_response: >
        To ensure the best performance for your OpenShift cluster
        on OCI, size your volume performance units appropriately.
        For a test or proof of concept environment, use 100 GB and
        20 to 30 VPUs. For a basic environment, use 500 GB and
        60 VPUs. For a heavy production environment, use more than
        500 GB and 100 or more VPUs. Consider reserving additional
        VPUs for updates and scaling activities.
      expected_keywords:
        - - VPU
          - volume performance
        - - "100"
        - - "500"
      expected_intent: >
        Retrieve VPU sizing recommendations for OpenShift on OCI
        across different environment tiers
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval

