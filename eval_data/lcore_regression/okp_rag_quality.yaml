- conversation_group_id: okp_retention_ha_fencing_to_resources
  description: >
    Turn 1 asks about HA cluster fencing on RHEL. Turn 2 asks how
    to configure pcs resource ordering and colocation constraints.
    The assistant must retain the Pacemaker/pcs context from turn 1.
  tag: okp_retention
  conversation_metrics:
    - deepeval:knowledge_retention
  turns:
    - turn_id: ha_fencing_context
      query: >
        What is Red Hat's recommendation on running Pacemaker
        clusters without fencing?
      expected_response: >
        Red Hat does not support Pacemaker clusters without fencing
        in production environments. While you can set
        stonith-enabled=false to disable it, fencing is crucial
        for isolating failed nodes and preventing data corruption.
      expected_keywords:
        - - fencing
          - stonith
        - - Red Hat
          - support
      expected_intent: >
        Understand Red Hat's policy on HA cluster fencing
      turn_metrics:
        - ragas:faithfulness
        - custom:answer_correctness
        - custom:keywords_eval

    - turn_id: ha_resource_ordering
      query: >
        How do I configure pcs constraint order and pcs constraint
        colocation to control resource startup sequence in a RHEL
        High Availability Pacemaker cluster?
      expected_response: >
        To make resources start in sequence and run on the same node,
        use the pcs command-line utility. Create an order constraint
        with pcs constraint order to ensure the first resource starts
        before the second. Then create a colocation constraint with
        pcs constraint colocation add to ensure both resources run on
        the same node. Use INFINITY as the score to make the
        colocation mandatory.
      expected_keywords:
        - - pcs
        - - constraint
        - - order
          - colocation
      expected_intent: >
        Explain how to configure resource ordering and colocation
        constraints in a Pacemaker cluster, building on the HA
        context from the previous answer
      turn_metrics:
        - ragas:faithfulness
        - custom:answer_correctness
        - custom:keywords_eval
        - custom:intent_eval
