core:
  max_threads: 1
llm_pool:
  defaults:
    cache_enabled: false
    timeout: 60
    num_retries: 1
    parameters:
      temperature: 0.0
      max_completion_tokens: 512
  models:
    judge_gpt_4o_mini:
      provider: openai
      model: gpt-4o-mini
judge_panel:
  judges:
  - judge_gpt_4o_mini
api:
  enabled: false
  cache_enabled: false
metrics_metadata:
  turn_level:
    ragas:context_recall:  # ContextRecall
      threshold: 0.7
      description: Measures how well the context covers the expected answer
      default: true
    ragas:context_relevance:  # ContextRelevance
      threshold: 0.7
      description: Measures relevance of retrieved context to the query
      default: true
    ragas:context_precision_without_reference:  # ContextUtilization
      threshold: 0.7
      description: Evaluates precision of context ranking (no reference needed)
      default: true
    ragas:context_precision_with_reference:  # ContextPrecision
      threshold: 0.7
      description: Evaluates precision of context using expected answer
      default: true
storage:
- type: file
  output_dir: examples/02_metrics/context_quality/eval_output
  base_filename: evaluation
  enabled_outputs:
  - csv
  - json
  - txt
  csv_columns:
  - conversation_group_id
  - turn_id
  - metric_identifier
  - score
  - threshold
  - result
  - reason
  - query
  - response
visualization:
  figsize:
  - 12
  - 8
  dpi: 150
  enabled_graphs:
  - pass_rates
  - score_distribution
  - status_breakdown
environment:
  LITELLM_LOG: ERROR
logging:
  source_level: INFO
  package_level: WARNING
  log_format: '%(asctime)s - %(levelname)s - %(message)s'
  show_timestamps: true
