core:
  max_threads: 1
api:
  enabled: false
  cache_enabled: false
metrics_metadata:
  turn_level:
    nlp:bleu:
      threshold: 0.5
      description: N-gram overlap between response and reference (BLEU-4)
      default: true
      max_ngram: 4
    nlp:rouge:
      threshold: 0.5
      description: Recall-oriented n-gram overlap (ROUGE-L)
      default: true
      rouge_type: rougeL
    nlp:semantic_similarity_distance:
      threshold: 0.7
      description: String similarity using Levenshtein distance
      default: true
      distance_measure: levenshtein
storage:
- type: file
  output_dir: examples/02_metrics/nlp_metrics/eval_output
  base_filename: evaluation
  enabled_outputs:
  - csv
  - json
  - txt
  csv_columns:
  - conversation_group_id
  - turn_id
  - metric_identifier
  - score
  - threshold
  - result
  - reason
  - query
  - response
visualization:
  figsize:
  - 14
  - 10
  dpi: 150
  enabled_graphs:
  - pass_rates
  - score_distribution
  - status_breakdown
logging:
  source_level: INFO
  package_level: WARNING
  log_format: '%(asctime)s - %(levelname)s - %(message)s'
  show_timestamps: true
