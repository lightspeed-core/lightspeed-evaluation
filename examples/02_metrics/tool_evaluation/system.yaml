core:
  max_threads: 1
api:
  enabled: false
  cache_enabled: false
metrics_metadata:
  turn_level:
    custom:tool_eval:
      description: Binary validation of tool calls (exact/regex matching)
      default: true
      ordered: true
      full_match: true
storage:
- type: file
  output_dir: examples/02_metrics/tool_evaluation/eval_output
  base_filename: evaluation
  enabled_outputs:
  - csv
  - json
  - txt
  csv_columns:
  - conversation_group_id
  - turn_id
  - metric_identifier
  - score
  - threshold
  - result
  - reason
  - query
visualization:
  figsize:
  - 10
  - 6
  dpi: 150
  enabled_graphs:
  - pass_rates
  - status_breakdown
logging:
  source_level: INFO
  package_level: WARNING
  log_format: '%(asctime)s - %(levelname)s - %(message)s'
  show_timestamps: true
