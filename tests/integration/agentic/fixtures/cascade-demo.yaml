# Cascading failure: the frontend is Running but never Ready because its
# readiness tracks reachability of the backend — and the backend's pod is
# stuck in ImagePullBackOff on a nonexistent tag. The root cause is the
# backend image; fixing the frontend's probe would be treating the symptom.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cascade-backend
  namespace: lightspeed-evaluation-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cascade-backend
  template:
    metadata:
      labels:
        app: cascade-backend
    spec:
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:7.77-does-not-exist
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: cascade-backend
  namespace: lightspeed-evaluation-test
spec:
  selector:
    app: cascade-backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cascade-frontend
  namespace: lightspeed-evaluation-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cascade-frontend
  template:
    metadata:
      labels:
        app: cascade-frontend
    spec:
      containers:
        - name: frontend
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                if curl -s -m 3 http://cascade-backend:8080/ >/dev/null; then
                  touch /tmp/backend-ok
                  echo "backend OK"
                else
                  rm -f /tmp/backend-ok
                  echo "ERROR: backend unreachable"
                fi
                sleep 5
              done
          readinessProbe:
            exec:
              command: ["cat", "/tmp/backend-ok"]
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
