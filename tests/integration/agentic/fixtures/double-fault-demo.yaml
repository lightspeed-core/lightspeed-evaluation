# Two independent faults in one pod: (1) envFrom references a missing
# ConfigMap df-settings (CreateContainerConfigError — the first observable
# fault), and (2) the liveness probe targets port 8081 while nginx listens
# on 8080, which surfaces only after fault 1 is fixed. Both must be found
# and fixed for the pod to stabilize.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: double-fault-demo
  namespace: lightspeed-evaluation-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: double-fault-demo
  template:
    metadata:
      labels:
        app: double-fault-demo
    spec:
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: df-settings
          livenessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
