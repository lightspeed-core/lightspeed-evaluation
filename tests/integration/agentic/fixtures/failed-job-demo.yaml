# Failed batch Job (ported from rhobs/troubleshooting-scenarios `failed_job`,
# upgraded to full lifecycle). prod-db is healthy and serves on 8080; the
# Service still advertises the decommissioned legacy port 3333 (endpoints
# exist, nothing listens → deterministic ECONNREFUSED). The Job is pinned to
# DB_PORT=3333, so every connection attempt fails and the Job exhausts its
# backoffLimit. The fix is on the Job side (point it at 8080) — and because a
# Job's pod template is immutable, remediation must recreate the Job (or run
# a corrected copy), exercising Job-specific mechanics no Deployment
# scenario covers.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-db
  namespace: lightspeed-evaluation-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prod-db
  template:
    metadata:
      labels:
        app: prod-db
    spec:
      containers:
        - name: db
          image: docker.io/nginxinc/nginx-unprivileged:1.27
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: prod-db
  namespace: lightspeed-evaluation-test
spec:
  selector:
    app: prod-db
  ports:
    - name: db
      port: 8080
      targetPort: 8080
    # Decommissioned: the container no longer listens here, but the port was
    # never removed from the Service — connections are forwarded and refused.
    - name: legacy-db
      port: 3333
      targetPort: 3333
---
apiVersion: batch/v1
kind: Job
metadata:
  name: inventory-sync-validator
  namespace: lightspeed-evaluation-test
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: inventory-sync-validator
    spec:
      restartPolicy: Never
      containers:
        - name: validator
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          env:
            - name: DB_HOST
              value: prod-db
            - name: DB_PORT
              value: "3333"
          command:
            - /bin/bash
            - -c
            - |
              echo "$(date -u +%FT%TZ) INFO inventory-sync-validator starting: validating inventory against database at ${DB_HOST}:${DB_PORT}"
              for i in 1 2 3 4 5; do
                if (exec 3<>"/dev/tcp/${DB_HOST}/${DB_PORT}") 2>/dev/null; then
                  echo "$(date -u +%FT%TZ) INFO connected to ${DB_HOST}:${DB_PORT}"
                  echo "$(date -u +%FT%TZ) INFO validated 1200 inventory records — sync validation complete"
                  exit 0
                fi
                echo "$(date -u +%FT%TZ) ERROR connect to ${DB_HOST}:${DB_PORT} failed: errno 111 (connection refused) — attempt ${i}/5"
                sleep 3
              done
              echo "$(date -u +%FT%TZ) FATAL could not reach database at ${DB_HOST}:${DB_PORT} after 5 attempts — aborting"
              exit 1
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
