# Needle-in-haystack sweep: five workloads, exactly two broken —
# svc-charlie (missing ConfigMap chaos-config) and svc-echo (nonexistent
# image tag). The other three are healthy. Analysis-only.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-alpha
  namespace: lightspeed-evaluation-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-alpha
  template:
    metadata:
      labels:
        app: svc-alpha
    spec:
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
