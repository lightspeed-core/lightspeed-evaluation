spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-charlie
  template:
    metadata:
      labels:
        app: svc-charlie
    spec:
      containers:
        # Broken: references a ConfigMap that doesn't exist.
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: chaos-config
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
