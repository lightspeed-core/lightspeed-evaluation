# Requests 64Mi in a namespace whose LimitRange requires >= 256Mi per
# container — the ReplicaSet gets "forbidden: minimum memory usage per
# Container is 256Mi" and no pod is created.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: limitrange-demo
  namespace: lightspeed-evaluation-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: limitrange-demo
  template:
    metadata:
      labels:
        app: limitrange-demo
    spec:
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
