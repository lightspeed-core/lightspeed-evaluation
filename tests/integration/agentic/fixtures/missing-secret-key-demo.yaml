# The secret exists but lacks the "password" key the container references —
# pods sit in CreateContainerConfigError ("couldn't find key password").
apiVersion: v1
kind: Secret
metadata:
  name: db-creds
  namespace: lightspeed-evaluation-test
type: Opaque
stringData:
  username: app-user
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: missing-secret-key-demo
  namespace: lightspeed-evaluation-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: missing-secret-key-demo
  template:
    metadata:
      labels:
        app: missing-secret-key-demo
    spec:
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27
          ports:
            - containerPort: 8080
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: password
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
