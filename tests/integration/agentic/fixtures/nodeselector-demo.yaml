# nodeSelector requires a label no node in the cluster carries — pods stay
# Pending with "didn't match Pod's node affinity/selector".
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeselector-demo
  namespace: lightspeed-evaluation-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodeselector-demo
  template:
    metadata:
      labels:
        app: nodeselector-demo
    spec:
      nodeSelector:
        eval-disktype: ssd-nvme
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
