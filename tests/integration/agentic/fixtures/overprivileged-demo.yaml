# A plain web app whose ServiceAccount is bound to cluster-admin within the
# namespace — massive over-privilege for a workload that needs nothing from
# the API. Analysis-only: classify the risk and propose least privilege.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webapp-sa
  namespace: lightspeed-evaluation-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: webapp-admin-binding
  namespace: lightspeed-evaluation-test
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: webapp-sa
    namespace: lightspeed-evaluation-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: overprivileged-webapp
  namespace: lightspeed-evaluation-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: overprivileged-webapp
  template:
    metadata:
      labels:
        app: overprivileged-webapp
    spec:
      serviceAccountName: webapp-sa
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
