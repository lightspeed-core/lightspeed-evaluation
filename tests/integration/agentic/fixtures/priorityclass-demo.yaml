# References a PriorityClass that doesn't exist on this cluster (a leftover
# from another environment) — the ReplicaSet gets "no PriorityClass with
# name eval-critical-priority was found" and no pod is created. The
# in-namespace fix is removing/correcting the reference.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: priorityclass-demo
  namespace: lightspeed-evaluation-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: priorityclass-demo
  template:
    metadata:
      labels:
        app: priorityclass-demo
    spec:
      priorityClassName: eval-critical-priority
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
