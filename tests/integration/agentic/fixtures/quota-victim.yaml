# Applied after the quota is exhausted — its ReplicaSet gets
# "exceeded quota: eval-pod-quota" and no pod is ever created.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quota-victim-app
  namespace: lightspeed-evaluation-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quota-victim-app
  template:
    metadata:
      labels:
        app: quota-victim-app
    spec:
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
