# The readiness probe checks a path that doesn't exist, so the pod runs but
# never becomes Ready and the service has no endpoints. No liveness probe —
# the container is never restarted, distinguishing this from a crash loop.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: readiness-probe-demo
  namespace: lightspeed-evaluation-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: readiness-probe-demo
  template:
    metadata:
      labels:
        app: readiness-probe-demo
    spec:
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /nonexistent-ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: readiness-demo-svc
  namespace: lightspeed-evaluation-test
spec:
  selector:
    app: readiness-probe-demo
  ports:
    - port: 80
      targetPort: 8080
