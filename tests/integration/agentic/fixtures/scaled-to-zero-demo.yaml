# A perfectly healthy deployment accidentally scaled to zero replicas —
# the only fault is replicas: 0.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaled-to-zero-demo
  namespace: lightspeed-evaluation-test
spec:
  replicas: 0
  selector:
    matchLabels:
      app: scaled-to-zero-demo
  template:
    metadata:
      labels:
        app: scaled-to-zero-demo
    spec:
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
