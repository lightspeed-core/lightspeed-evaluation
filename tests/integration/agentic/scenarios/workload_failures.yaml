- conversation_group_id: proposal_bad_command
  description: CrashLoopBackOff — command override points at a nonexistent binary, full lifecycle
  tag: proposal_bad_command
  setup_script: ../scripts/setup_bad_command.sh
  cleanup_script: ../scripts/cleanup_bad_command.sh
  conversation_metrics: []
  turns:
    - turn_id: turn_1
      proposal_spec:
        request: >-
          The deployment bad-command-demo in namespace
          lightspeed-evaluation-test stopped working after someone edited
          its manifest. The container is a stock nginx-unprivileged image
          that worked fine with its default entrypoint. Analyze the root
          cause, restore the deployment to a working state, and verify
          the pod is stable.
        targetNamespaces:
          - lightspeed-evaluation-test
        tools: *eval_tools
        analysis:
          agent: eval-default
        execution:
          agent: eval-default
        verification:
          agent: eval-default
      expected_proposal_status:
        phase: Completed
        max_duration: "20m"
        max_attempts: 5
        analysis:
          min_options: 1
        execution:
          phase: Succeeded
        verification:
          passed: true
      expected_outcome: >-
        Root cause: the container has a command override
        (/usr/bin/run-app) pointing at a binary that does not exist in
        the image, so it fails with StartError ("executable file not
        found") and crash-loops. Remediation: remove the bad command
        override so the image's default entrypoint runs, and verify the
        pod reaches Running state without restarts.
      expected_analysis_outcome: >-
        The agent should identify from container status ("StartError",
        "executable file not found in $PATH: /usr/bin/run-app") that the
        command override is broken, not the image or its configuration.
      expected_execution_outcome: >-
        The agent should remove (or correct) the container command
        override so the image default entrypoint starts nginx.
      expected_verification_outcome: >-
        The agent should verify the pod runs stably with no further
        restarts after the override is removed.
      turn_metrics:
        - custom:proposal_status
        - custom:proposal_evaluation_correctness

