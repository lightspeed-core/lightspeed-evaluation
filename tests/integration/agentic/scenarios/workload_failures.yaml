- conversation_group_id: proposal_ephemeral_eviction
  description: Repeated pod eviction — emptyDir usage exceeds sizeLimit, full lifecycle
  tag: proposal_ephemeral_eviction
  setup_script: ../scripts/setup_ephemeral_eviction.sh
  cleanup_script: ../scripts/cleanup_ephemeral_eviction.sh
  conversation_metrics: []
  turns:
    - turn_id: turn_1
      proposal_spec:
        request: >-
          Pods for deployment ephemeral-eviction-demo in namespace
          lightspeed-evaluation-test keep getting killed and recreated.
          The app legitimately needs to build a local cache of roughly
          64Mi at startup. Analyze the root cause, fix the configuration
          so the cache fits, and verify the pod stays running.
        targetNamespaces:
          - lightspeed-evaluation-test
        tools: *eval_tools
        analysis:
          agent: eval-default
        execution:
          agent: eval-default
        verification:
          agent: eval-default
      expected_proposal_status:
        phase: Completed
        max_duration: "20m"
        max_attempts: 5
        analysis:
          min_options: 1
        execution:
          phase: Succeeded
        verification:
          passed: true
      expected_outcome: >-
        Root cause: the pod writes a ~64Mi cache into an emptyDir volume
        capped at sizeLimit 10Mi, so the kubelet evicts the pod ("Usage
        of EmptyDir volume ... exceeds the limit") and the deployment
        recreates it in a loop. Remediation: raise the emptyDir sizeLimit
        (e.g. to 128Mi) so the cache fits, and verify the pod stays
        Running without further evictions.
      expected_analysis_outcome: >-
        The agent should find the eviction events citing emptyDir usage
        over the 10Mi sizeLimit and connect them to the app's ~64Mi cache
        — distinguishing eviction from OOMKill or crash.
      expected_execution_outcome: >-
        The agent should increase the scratch emptyDir sizeLimit to
        comfortably fit the 64Mi cache (per the request, the cache size
        is legitimate).
      expected_verification_outcome: >-
        The agent should verify the pod finishes warming its cache and
        stays Running without eviction.
      turn_metrics:
        - custom:proposal_status
        - custom:proposal_evaluation_correctness
