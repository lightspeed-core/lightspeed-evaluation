- conversation_group_id: proposal_stuck_rollout
  description: Stuck rollout — bad image over healthy deployment, ProgressDeadlineExceeded, rollback expected
  tag: proposal_stuck_rollout
  setup_script: ../scripts/setup_stuck_rollout.sh
  cleanup_script: ../scripts/cleanup_stuck_rollout.sh
  conversation_metrics: []
  turns:
    - turn_id: turn_1
      proposal_spec:
        request: >-
          A recent release of stuck-rollout-demo in namespace
          lightspeed-evaluation-test is not completing — the rollout has
          been stuck for a while and the deployment reports it failed to
          progress. The previous version was healthy. Analyze what went
          wrong, restore the service to a good state, and verify the
          rollout is complete and stable.
        targetNamespaces:
          - lightspeed-evaluation-test
        tools: *eval_tools
        analysis:
          agent: eval-default
        execution:
          agent: eval-default
        verification:
          agent: eval-default
      expected_proposal_status:
        phase: Completed
        max_duration: "20m"
        max_attempts: 5
        analysis:
          min_options: 1
        execution:
          phase: Succeeded
        verification:
          passed: true
      expected_outcome: >-
        Root cause: the new ReplicaSet's pod is in ImagePullBackOff
        because the rolled-out image tag
        nginx-unprivileged:9.99-broken does not exist, so the rollout hit
        ProgressDeadlineExceeded while the old ReplicaSet keeps serving
        (maxUnavailable: 0). Remediation: roll back to the previous
        working revision (or restore a valid image tag) and verify the
        rollout completes with the pod Running.
      expected_analysis_outcome: >-
        The agent should identify the failed rollout (Progressing=False,
        ProgressDeadlineExceeded), attribute it to the new ReplicaSet's
        ImagePullBackOff on the 9.99-broken tag, and note the old
        ReplicaSet is still serving traffic.
      expected_execution_outcome: >-
        The agent should roll the deployment back to the previous working
        image (rollout undo or setting the image back to a valid tag).
      expected_verification_outcome: >-
        The agent should verify the rollout completes, only the healthy
        ReplicaSet remains active, and the pod is Running.
      turn_metrics:
        - custom:proposal_status
        - custom:proposal_evaluation_correctness

