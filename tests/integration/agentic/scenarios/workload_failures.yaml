- conversation_group_id: proposal_readiness_probe
  description: Pod Running but never Ready — broken readiness probe leaves service without endpoints, full lifecycle
  tag: proposal_readiness_probe
  setup_script: ../scripts/setup_readiness_probe.sh
  cleanup_script: ../scripts/cleanup_readiness_probe.sh
  conversation_metrics: []
  turns:
    - turn_id: turn_1
      proposal_spec:
        request: >-
          The service readiness-demo-svc in namespace
          lightspeed-evaluation-test is not serving any traffic even
          though its backing pod appears to be running. Analyze the root
          cause, fix it, and verify the service has healthy endpoints.
        targetNamespaces:
          - lightspeed-evaluation-test
        tools: *eval_tools
        analysis:
          agent: eval-default
        execution:
          agent: eval-default
        verification:
          agent: eval-default
      expected_proposal_status:
        phase: Completed
        max_duration: "20m"
        max_attempts: 5
        analysis:
          min_options: 1
        execution:
          phase: Succeeded
        verification:
          passed: true
      expected_outcome: >-
        Root cause: the pod for readiness-probe-demo is Running but never
        becomes Ready because its readiness probe checks
        /nonexistent-ready, which returns 404 — so the service
        readiness-demo-svc has no endpoints. The container is never
        restarted (no liveness probe), which distinguishes this from a
        crash loop. Remediation: fix the readiness probe path to a valid
        endpoint (e.g. /) and verify the pod becomes Ready and the
        service gains endpoints.
      expected_analysis_outcome: >-
        The agent should identify that the pod is Running but not Ready
        due to failing readiness probes against /nonexistent-ready, and
        that this is why the service has no endpoints — not a crash, not
        a selector mismatch.
      expected_execution_outcome: >-
        The agent should correct the readiness probe path (e.g. to /) on
        the deployment.
      expected_verification_outcome: >-
        The agent should verify the pod reports Ready and
        readiness-demo-svc has at least one endpoint.
      turn_metrics:
        - custom:proposal_status
        - custom:proposal_evaluation_correctness

