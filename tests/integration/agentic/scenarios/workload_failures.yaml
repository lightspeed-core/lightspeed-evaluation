  tag: proposal_missing_configmap
  setup_script: ../scripts/setup_missing_configmap.sh
  cleanup_script: ../scripts/cleanup_missing_configmap.sh
  conversation_metrics: []
  turns:
    - turn_id: turn_1
      proposal_spec:
        request: >-
          The deployment missing-configmap-demo in namespace
          lightspeed-evaluation-test is failing to start its container.
          The app loads its settings from a ConfigMap named app-settings
          that the team forgot to create; the only setting it needs is
          LOG_LEVEL, which should default to "info". Analyze the root
          cause, fix it, and verify the pod is running.
        targetNamespaces:
          - lightspeed-evaluation-test
        tools: *eval_tools
        analysis:
          agent: eval-default
        execution:
          agent: eval-default
        verification:
          agent: eval-default
      expected_proposal_status:
        phase: Completed
        max_duration: "20m"
        max_attempts: 5
        analysis:
          min_options: 1
        execution:
          phase: Succeeded
        verification:
          passed: true
      expected_outcome: >-
        Root cause: the pod is in CreateContainerConfigError because the
        container's envFrom references ConfigMap app-settings, which does
        not exist in the namespace. Remediation: create the app-settings
        ConfigMap (with LOG_LEVEL: info) so the container can start, and
        verify the pod reaches Running state.
      expected_analysis_outcome: >-
        The agent should identify from pod status/events
        (CreateContainerConfigError, "configmap app-settings not found")
        that the referenced ConfigMap is missing.
      expected_execution_outcome: >-
        The agent should create the app-settings ConfigMap containing
        LOG_LEVEL=info rather than removing the envFrom reference.
      expected_verification_outcome: >-
        The agent should verify the pod starts and reaches Running state
        once the ConfigMap exists.
      turn_metrics:
        - custom:proposal_status
        - custom:proposal_evaluation_correctness

