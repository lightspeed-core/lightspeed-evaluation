        request: >-
          The deployment missing-env-demo in namespace
          lightspeed-evaluation-test is crash-looping. Check the
          container logs to find out why it exits. If it needs
          configuration that is missing, use the staging database URL
          postgres://staging-db.example.internal:5432/app. Fix the issue
          and verify the pod is running.
