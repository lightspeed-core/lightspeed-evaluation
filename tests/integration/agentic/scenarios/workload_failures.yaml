# Category A: workload crash & configuration faults.
#
# Deterministic single-fault scenarios on a vanilla OpenShift cluster.
# Provider-agnostic — select the provider via EVAL_PROVIDER (see
# ../scripts/_setup_infra.sh). Script paths are relative to this file.

- conversation_group_id: proposal_imagepull_tag
  description: ImagePullBackOff — nonexistent image tag, full lifecycle
  tag: proposal_imagepull_tag
  setup_script: ../scripts/setup_imagepull_tag.sh
  cleanup_script: ../scripts/cleanup_imagepull_tag.sh
  conversation_metrics: []
  turns:
    - turn_id: turn_1
      proposal_spec:
        request: >-
          The deployment imagepull-tag-demo in namespace
          lightspeed-evaluation-test has no running pods after a recent
          change. The team says the app should run the standard
          nginxinc/nginx-unprivileged image at version 1.27. Analyze the
          root cause, fix the deployment, and verify the pod is running.
        targetNamespaces:
          - lightspeed-evaluation-test
        tools: &eval_tools
          skills:
            # TODO(rioloc): replace with a stable image
            - image: quay.io/harpatil/agentic-skills:latest
              paths:
                - /skills/find-token
        analysis:
          agent: eval-default
        execution:
          agent: eval-default
        verification:
          agent: eval-default
      expected_proposal_status:
        phase: Completed
        max_duration: "20m"
        max_attempts: 5
        analysis:
          min_options: 1
        execution:
          phase: Succeeded
        verification:
          passed: true
      expected_outcome: >-
        Root cause: the pod is in ImagePullBackOff because the image tag
        docker.io/nginxinc/nginx-unprivileged:9.99-does-not-exist
        does not exist in the registry (manifest unknown). Remediation:
        correct the image reference to a valid tag (e.g.
        nginx-unprivileged:1.27) and verify the pod pulls the image and
        reaches Running state.
      expected_analysis_outcome: >-
        The agent should identify from pod events (ErrImagePull /
        ImagePullBackOff, "manifest unknown" or "not found") that the
        image tag 9.99-does-not-exist is invalid, not an authentication
        or network problem.
      expected_execution_outcome: >-
        The agent should patch the deployment's container image to a
        valid nginx-unprivileged tag such as 1.27.
      expected_verification_outcome: >-
        The agent should verify the new pod pulls its image successfully
        and reaches Running state.
      turn_metrics:
        - custom:proposal_status
        - custom:proposal_evaluation_correctness

- conversation_group_id: proposal_imagepull_auth
  description: ImagePullBackOff — private registry without pull secret, analysis-only diagnosis
  tag: proposal_imagepull_auth
  setup_script: ../scripts/setup_imagepull_auth.sh
  cleanup_script: ../scripts/cleanup_imagepull_auth.sh
  conversation_metrics: []
  turns:
    - turn_id: turn_1
      proposal_spec:
        request: >-
          The deployment imagepull-auth-demo in namespace
          lightspeed-evaluation-test cannot start its pod. The image
          quay.io/lightspeed-eval-private/internal-app:1.0 is published
          in a private registry organization. Analyze why the pod is not
          starting and explain what the team needs to do to fix it. Do
          not make any changes.
        targetNamespaces:
          - lightspeed-evaluation-test
        tools: *eval_tools
        analysis:
          agent: eval-default
      expected_proposal_status:
        phase: Completed
        analysis:
          min_options: 1
      expected_outcome: >-
        The pod is in ImagePullBackOff because pulling
        quay.io/lightspeed-eval-private/internal-app:1.0 fails with an
        authorization error ("unauthorized" / "access to the requested
        resource is not authorized") — the image is private and neither
        the pod nor its service account references an imagePullSecret
        with registry credentials. The fix is to create a docker-registry
        pull secret with valid quay.io credentials and reference it via
        imagePullSecrets (on the pod spec or linked to the service
        account).
      expected_analysis_outcome: >-
        The agent should distinguish an authorization failure from a
        missing-tag failure using the pull error message, conclude that
        registry credentials (an imagePullSecret) are missing, and
        recommend creating and linking a pull secret rather than changing
        the image reference.
      turn_metrics:
        - custom:proposal_status
        - custom:proposal_evaluation_correctness

- conversation_group_id: proposal_missing_configmap
