- conversation_group_id: proposal_oomkill_openai
  description: OOMKill full lifecycle — status check + LLM-as-judge evaluation
  tag: proposal_oomkill
  setup_script: agentic/scripts/setup_oomkill-openai.sh
  cleanup_script: agentic/scripts/cleanup_oomkill-openai.sh
  conversation_metrics: []
  conversation_metrics_metadata: {}
  turns:
    - turn_id: turn_1
      proposal_spec:
        request: >-
          A pod named oomkill-demo in namespace lightspeed-evaluation-test
          is in CrashLoopBackOff due to OOMKill. Analyze the root cause,
          fix the memory configuration, and verify the fix.
        targetNamespaces:
          - lightspeed-evaluation-test
        tools:
          skills:
            # TODO(rioloc): replace with a stable image
            - image: quay.io/harpatil/agentic-skills:latest
              paths:
                - /skills/find-token
        analysis:
          agent: eval-default
        execution:
          agent: eval-default
        verification:
          agent: eval-default
      expected_proposal_status:
        phase: Completed
      expected_outcome: >-
        Root cause: the pod oomkill-demo is OOMKilled because its container
        memory limit is too low. Remediation: increase the container memory
        limit (e.g. to 512Mi) and verify the pod reaches Running state
        without further OOMKill events.
      expected_analysis_outcome: >-
        The agent should identify that the pod oomkill-demo is being
        OOMKilled because its container memory limit is set too low
        (e.g. 128Mi), causing the kernel to terminate the process.
      expected_execution_outcome: >-
        The agent should increase the container memory limit (e.g. to
        512Mi) by patching the pod or its owning workload resource.
      expected_verification_outcome: >-
        The agent should verify the pod reaches Running state without
        further OOMKill events.
      turn_metrics:
        - custom:proposal_status
        - custom:proposal_evaluation_correctness
      turn_metrics_metadata:
        "custom:proposal_evaluation_correctness":
          threshold: 0.75

